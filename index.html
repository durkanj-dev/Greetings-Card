<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Year of the Horse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #f9f9f9;
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f4f4 100%);
            color: #8B0000;
            font-family: 'Georgia', serif;
            text-align: center;
            padding: 40px 15px;
            min-height: 100vh;
            display: block; /* Ensures natural scrolling */
        }
        .card {
            max-width: 800px;
            margin: 20px auto; /* Added margin at the top */
            background: #ffffff;
            padding: 40px 20px;
            border: 3px double #B8860B;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
        }
        h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            color: #B8860B;
            margin-bottom: 25px;
        }
        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 30px;
            border: 1px solid #ddd;
            background: #000;
        }
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .content p {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            line-height: 1.8;
            margin-bottom: 20px;
            color: #333;
        }
        .japanese-text {
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            color: #8B0000;
            display: block;
            margin: 25px 0;
            font-weight: bold;
        }
        .signature {
            font-family: 'Segoe Script', 'Brush Script MT', cursive;
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            color: #B8860B;
            margin-top: 10px;
        }
        .spacer { height: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>2026 Year of the Horse</h1>
        <div class="video-box">
            <iframe 
                src="https://www.youtube.com/embed/RhH0dQ0Igiw?rel=0&loop=1&playlist=RhH0dQ0Igiw" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="content">
            <p>Dear Kaoru,</p>
            <p>In honor of your remarkable samurai lineage, we wanted to send you this special greeting.</p>
            <p>May the strength and spirit of the Horse bring you and your family victory, health, and boundless joy this year.</p>
            <span class="japanese-text">幸せと健康が満ちますように</span>
            <p>With warmest wishes,</p>
            <div class="signature">John and family</div>
        </div>
        <div class="spacer"></div>
    </div>
</body>
</html>
