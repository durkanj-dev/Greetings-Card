<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Year of the Horse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #fcfaf2; 
            color: #8B0000;
            font-family: 'serif';
            text-align: center;
            padding: 40px 15px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* The Texture Overlay - Fixed to allow clicking through */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events: none; /* THIS ALLOWS THE VIDEO TO BE CLICKED */
            z-index: 2;
            opacity: 0.6;
        }

        /* Improved Petals - Also non-blocking */
        .sakura {
            position: fixed;
            top: -10%;
            background-color: #ffb7c5;
            border-radius: 100% 0 100% 0;
            opacity: 0.6;
            pointer-events: none; /* CANNOT BLOCK CLICKS */
            z-index: 3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(50vh) rotate(180deg) translateX(20px); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; }
        }

        .card {
            max-width: 800px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 25px;
            border: 2px solid #B8860B;
            outline: 6px double #B8860B;
            outline-offset: -12px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            position: relative;
            z-index: 10; /* Above the texture and petals */
        }

        h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            color: #B8860B;
            margin-bottom: 30px;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 40px;
            border: 2px solid #333;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20; /* Ensures video is on the very top layer */
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 0;
        }

        .content p {
            font-size: clamp(1.1rem, 4.5vw, 1.35rem);
            line-height: 1.9;
            margin-bottom: 25px;
            color: #2c2c2c;
        }

        .japanese-text {
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
            font-size: clamp(1.4rem, 6vw, 2rem);
            color: #8B0000;
            display: inline-block;
            margin: 30px 0;
            padding: 10px 20px;
            border: 2px solid #8B0000;
            font-weight: bold;
            background: rgba(139, 0, 0, 0.03);
        }

        .signature {
            font-family: 'Segoe Script', 'Brush Script MT', cursive;
            font-size: clamp(1.8rem, 7vw, 2.5rem);
            color: #B8860B;
            margin-top: 15px;
        }
        
        .spacer { height: 60px; }
    </style>
</head>
<body>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('sakura');
            const size = Math.random() * 12 + 6 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 7 + 4 + 's'; 
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 10000);
        }
        setInterval(createPetal, 450);
    </script>

    <div class="card">
        <h1>2026 Year of the Horse</h1>
        
        <div class="video-box">
            <iframe 
                src="https://www.youtube.com/embed/RhH0dQ0Igiw?rel=0&loop=1&playlist=RhH0dQ0Igiw" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="content">
            <p>Dear Kaoru,</p>
            <p>In honor of your remarkable samurai lineage, we wanted to send you this special greeting.</p>
            <p>May the strength and spirit of the Horse bring you and your family victory, health, and boundless joy this year.</p>
            
            <div class="japanese-text">幸せと健康が満ちますように</div>

            <p>With warmest wishes,</p>
            <div class="signature">John and family</div>
        </div>
        <div class="spacer"></div>
    </div>

</body>
</html>
